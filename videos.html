<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Videos</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 via-slate-50 to-slate-200 flex flex-col items-center py-8 px-4 font-sans sm:py-12">

  <div class="w-full max-w-md bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.08)] p-6 sm:p-8 space-y-6 border border-white">

    <div class="flex items-center justify-between">
      <a href="index.html" class="flex items-center text-slate-500 text-sm font-semibold hover:text-slate-700">
        <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i>
        Dashboard
      </a>
    </div>

    <div class="text-center space-y-2">
      <div class="w-16 h-16 mx-auto flex items-center justify-center mb-1 bg-white rounded-full shadow-sm border border-slate-100 ring-4 ring-white/50 overflow-hidden">
        <i data-lucide="video" class="w-7 h-7 text-rose-500"></i>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Weekly Videos</h1>
      <p class="text-slate-500 text-sm leading-relaxed px-2 font-medium">Mindset & education, one new video every week.</p>
    </div>

    <div id="latest-section"></div>

    <div id="archive-section" class="space-y-3"></div>

  </div>

  <script>
    lucide.createIcons();

    // Add a new entry at the TOP of this list each week.
    const VIDEOS = [
      { title: "Scale Weight - The Truth", date: "26 Jun 2026", youtubeId: "cyNKGOLQP8A" },
    ];

    function youtubeEmbedUrl(id) {
      return `https://www.youtube.com/embed/${id}`;
    }

    const latestSection = document.getElementById('latest-section');
    const archiveSection = document.getElementById('archive-section');

    if (VIDEOS.length === 0) {
      latestSection.innerHTML = `
        <div class="rounded-2xl border border-slate-100 bg-slate-50 p-8 text-center">
          <i data-lucide="clock" class="w-6 h-6 text-slate-400 mx-auto mb-2"></i>
          <p class="text-sm font-semibold text-slate-500">No video yet this week — check back soon!</p>
        </div>
      `;
    } else {
      const latest = VIDEOS[0];
      latestSection.innerHTML = `
        <div class="text-center mb-3">
          <p class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-rose-500 to-pink-600 bg-clip-text text-transparent">Latest Video</p>
          <i data-lucide="chevron-down" class="w-6 h-6 text-rose-400 mx-auto animate-bounce mt-1"></i>
        </div>
        <div class="rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <div class="flex items-center justify-between px-4 py-3 bg-slate-50 border-b border-slate-100">
            <span class="text-sm font-bold text-slate-700 tracking-wide">This week</span>
            <span class="text-xs text-slate-400 font-medium">${latest.date}</span>
          </div>
          <div class="aspect-video w-full">
            <iframe class="w-full h-full" src="${youtubeEmbedUrl(latest.youtubeId)}" title="${latest.title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
          <div class="px-4 py-3">
            <p class="font-bold text-sm text-slate-800">${latest.title}</p>
          </div>
        </div>
      `;

      const older = VIDEOS.slice(1);
      if (older.length > 0) {
        archiveSection.innerHTML = `<p class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Past videos</p>` +
          older.map(v => `
            <a href="https://www.youtube.com/watch?v=${v.youtubeId}" target="_blank" rel="noopener noreferrer" class="flex items-center p-4 rounded-2xl bg-white border border-slate-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-200">
              <div class="w-10 h-10 rounded-xl bg-rose-50 flex items-center justify-center mr-3 flex-shrink-0">
                <i data-lucide="play" class="w-5 h-5 text-rose-500"></i>
              </div>
              <div class="flex-1 min-w-0">
                <div class="font-bold text-sm text-slate-800 truncate">${v.title}</div>
                <div class="text-xs text-slate-400 mt-0.5">${v.date}</div>
              </div>
            </a>
          `).join('');
      }
    }

    lucide.createIcons();
  </script>
</body>
</html>
