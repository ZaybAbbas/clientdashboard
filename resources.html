    function cleanTitle(t) {
      return t
        .replace(/\.(pdf|png|jpg|jpeg)$/i, '')
        .replace(/\s*pdf$/i, '')
        .replace(/W_\s*/g, 'With ')
        .replace(/_/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/\.$/, '')
        .trim();
    }

    function formatSize(bytes) {
      return (bytes / 1e6).toFixed(1) + ' MB';
    }

    let active = CATEGORIES[0].key;
    const catsEl = document.getElementById('cats');
    const gridEl = document.getElementById('grid');

    function renderCats() {
      catsEl.innerHTML = '';
      CATEGORIES.forEach(c => {
        const isActive = c.key === active;
        const btn = document.createElement('button');
        btn.className = `flex items-center gap-1.5 flex-shrink-0 text-xs font-bold px-3 py-2 rounded-full whitespace-nowrap transition-colors ${
          isActive ? 'bg-amber-500 text-white shadow-sm' : 'bg-slate-100 text-slate-600'
        }`;
        btn.innerHTML = `<i data-lucide="${c.icon}" class="w-3.5 h-3.5"></i><span>${c.label}</span>`;
        btn.onclick = () => { active = c.key; renderCats(); renderGrid(); };
        catsEl.appendChild(btn);
      });
      lucide.createIcons();
    }

    function renderGrid() {
      gridEl.innerHTML = '';
      const items = MANIFEST[active] || [];
      items.forEach(item => {
        const a = document.createElement('a');
        a.href = item.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = 'flex items-center p-4 rounded-2xl bg-white border border-slate-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all duration-200';
        a.innerHTML = `
          <div class="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center mr-3 flex-shrink-0">
            <i data-lucide="file-text" class="w-5 h-5 text-amber-500"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-sm text-slate-800 truncate">${cleanTitle(item.title)}</div>
            <div class="text-xs text-slate-400 mt-0.5">${formatSize(item.sizeBytes)}</div>
          </div>
          <i data-lucide="download" class="w-4 h-4 text-slate-400 flex-shrink-0 ml-2"></i>
        `;
        gridEl.appendChild(a);
      });
      lucide.createIcons();
    }

    renderCats();
    renderGrid();
  </script>
